# App only — connects to your PC PostgreSQL (no DB container, no data copy)
# Use this on Synology when DB is on your office PC.

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - '${APP_PORT:-5080}:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5433}
      DB_NAME: ${DB_NAME:-harsh}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      DB_SSL: ${DB_SSL:-false}
