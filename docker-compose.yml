services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      # Host 5433 — Synology often already uses 5432
      - '${DB_HOST_PORT:-5433}:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-billing}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-billing}']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      # Host 5080 — Synology DSM already uses 5000
      - '${APP_PORT:-5080}:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-billing}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      DB_SSL: ${DB_SSL:-false}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
